      <stop offset=".46" stop-color="#e0a85a" stop-opacity=".42"/>
      <stop offset="1" stop-color="#86633c" stop-opacity=".06"/>
    </linearGradient>

    <linearGradient id="softHorizon" x1="0" y1="324" x2="697" y2="324" gradientUnits="userSpaceOnUse">
