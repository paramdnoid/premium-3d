    <pattern id="microDots" width="13" height="13" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r=".72" fill="#d8ba7d" opacity=".36"/>
    </pattern>

    <pattern id="pinDots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r=".92" fill="#f3ca82" opacity=".42"/>
    </pattern>

    <pattern id="surfaceSpeckle" width="54" height="54" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="19" r=".55" fill="#e2d0b2" opacity=".13"/>
      <circle cx="32" cy="7" r=".45" fill="#ffffff" opacity=".08"/>
      <circle cx="45" cy="38" r=".5" fill="#d7b06f" opacity=".12"/>
      <circle cx="18" cy="47" r=".38" fill="#ffffff" opacity=".06"/>
    </pattern>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".88" numOctaves="4" seed="29" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono">
        <feFuncA type="table" tableValues="0 .22"/>
      </feComponentTransfer>
    </filter>

    <filter id="fineRelief" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".031 .12" numOctaves="4" seed="13" result="relief"/>
      <feColorMatrix in="relief" type="matrix" values="0.38 0 0 0 0 0 0.38 0 0 0 0 0 0.38 0 0 0 0 0 .16 0"/>
    </filter>

    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 .94 0 .7 0 0 .43 0 0 .32 0 .12 0 0 0 .78 0" result="warm"/>
    </filter>

    <filter id="beamAura" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <mask id="leftPlaneMask">
      <rect width="1672" height="941" fill="black"/>
      <rect x="-18" y="252" width="930" height="690" fill="url(#leftPlaneFade)"/>
    </mask>

