<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Luminous perspective grid</title>
  <desc id="desc">A dark premium abstract background with a warm diagonal light beam, fine perspective grid lines, sparse glowing data points, subtle corner HUD structures, and cinematic surface grain.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1672" y2="941" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080909"/>
      <stop offset=".22" stop-color="#111212"/>
      <stop offset=".48" stop-color="#0c0d0d"/>
      <stop offset=".74" stop-color="#030404"/>
      <stop offset="1" stop-color="#010101"/>
    </linearGradient>

    <radialGradient id="centralMist" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(628 398) rotate(16) scale(536 382)">
      <stop stop-color="#57514a" stop-opacity=".28"/>
      <stop offset=".26" stop-color="#272928" stop-opacity=".2"/>
      <stop offset=".58" stop-color="#101111" stop-opacity=".08"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lineOriginGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(470 498) rotate(24) scale(210 128)">
      <stop stop-color="#fff0c8" stop-opacity=".34"/>
      <stop offset=".18" stop-color="#ffd38d" stop-opacity=".19"/>
      <stop offset=".55" stop-color="#32261a" stop-opacity=".08"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="leftPlaneFade" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 610) rotate(22) scale(716 370)">
      <stop stop-color="#fff"/>
      <stop offset=".44" stop-color="#fff" stop-opacity=".78"/>
      <stop offset=".82" stop-color="#fff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="cornerFade" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1616 326) rotate(-7) scale(186 234)">
      <stop stop-color="#fff" stop-opacity=".94"/>
      <stop offset=".62" stop-color="#fff" stop-opacity=".36"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="leftHudFade" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(96 268) rotate(12) scale(210 190)">
      <stop stop-color="#fff" stop-opacity=".78"/>
      <stop offset=".7" stop-color="#fff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="finalVignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(682 441) rotate(18) scale(1044 592)">
      <stop stop-color="#000" stop-opacity="0"/>
      <stop offset=".68" stop-color="#000" stop-opacity=".24"/>
      <stop offset="1" stop-color="#000" stop-opacity=".82"/>
    </radialGradient>

    <linearGradient id="rayStroke" x1="0" y1="530" x2="694" y2="662" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b38d58" stop-opacity=".06"/>
      <stop offset=".46" stop-color="#d5b47a" stop-opacity=".21"/>
      <stop offset=".74" stop-color="#f6d69a" stop-opacity=".36"/>
      <stop offset="1" stop-color="#ffe2aa" stop-opacity=".04"/>
    </linearGradient>

    <linearGradient id="crossStroke" x1="0" y1="449" x2="862" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c6a36d" stop-opacity=".08"/>
      <stop offset=".5" stop-color="#f3cf8f" stop-opacity=".2"/>
      <stop offset="1" stop-color="#ffe7b8" stop-opacity=".03"/>
