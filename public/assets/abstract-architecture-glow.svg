<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="864" viewBox="0 0 1672 864" role="img" aria-labelledby="title desc">
  <title id="title">Abstract architectural light composition</title>
  <desc id="desc">A dark premium abstract composition with glass panels, fine technical guide lines, a warm diagonal light beam, subtle dot matrices, and cinematic grain.</desc>
  <defs>
    <linearGradient id="backgroundGrad" x1="0" y1="0" x2="1672" y2="864" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070707"/>
      <stop offset=".48" stop-color="#090a0b"/>
      <stop offset="1" stop-color="#040405"/>
    </linearGradient>

    <radialGradient id="leftVignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(306 314) rotate(32) scale(770 486)">
      <stop stop-color="#121416" stop-opacity=".42"/>
      <stop offset=".52" stop-color="#090a0b" stop-opacity=".08"/>
      <stop offset="1" stop-color="#020202" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="panelGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1252 269) rotate(25) scale(388 218)">
      <stop stop-color="#f2efe5" stop-opacity=".42"/>
      <stop offset=".24" stop-color="#b9b7b0" stop-opacity=".16"/>
      <stop offset=".64" stop-color="#141517" stop-opacity=".06"/>
      <stop offset="1" stop-color="#050506" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="topPanelFill" x1="1218" y1="91" x2="1602" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1b1c"/>
      <stop offset=".25" stop-color="#212326"/>
      <stop offset=".58" stop-color="#111214"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>

    <linearGradient id="rightPanelFill" x1="1314" y1="355" x2="1542" y2="774" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151719"/>
      <stop offset=".3" stop-color="#222427"/>
      <stop offset=".72" stop-color="#0d0e10"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>

    <linearGradient id="lowerPanelFill" x1="1008" y1="593" x2="1317" y2="766" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111315"/>
      <stop offset=".38" stop-color="#0b0c0d"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>

    <linearGradient id="warmBeam" x1="818" y1="798" x2="1220" y2="329" gradientUnits="userSpaceOnUse">
      <stop stop-color="#222326" stop-opacity="0"/>
      <stop offset=".16" stop-color="#8f8b82" stop-opacity=".34"/>
      <stop offset=".46" stop-color="#ffe4ad" stop-opacity=".92"/>
      <stop offset=".68" stop-color="#fff5d6"/>
      <stop offset=".82" stop-color="#ffc56d" stop-opacity=".74"/>
      <stop offset="1" stop-color="#f7b459" stop-opacity=".08"/>
    </linearGradient>

    <linearGradient id="beamBloom" x1="950" y1="608" x2="1213" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f2b86f" stop-opacity="0"/>
      <stop offset=".42" stop-color="#ffd59a" stop-opacity=".32"/>
      <stop offset=".76" stop-color="#fff0cf" stop-opacity=".88"/>
      <stop offset="1" stop-color="#f4b15c" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="hotHorizontal" x1="971" y1="519" x2="1585" y2="519" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".12"/>
      <stop offset=".28" stop-color="#ffffff" stop-opacity=".42"/>
      <stop offset=".58" stop-color="#fff2d7" stop-opacity=".95"/>
      <stop offset=".74" stop-color="#f1a956" stop-opacity=".58"/>
      <stop offset="1" stop-color="#fff0cc" stop-opacity=".16"/>
    </linearGradient>

    <linearGradient id="coolLine" x1="955" y1="282" x2="1601" y2="282" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset=".28" stop-color="#f7f2e8" stop-opacity=".68"/>
      <stop offset=".46" stop-color="#ffffff" stop-opacity=".58"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".16"/>
    </linearGradient>

    <linearGradient id="softEdge" x1="1207" y1="64" x2="1207" y2="341" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset=".73" stop-color="#ffffff" stop-opacity=".46"/>
      <stop offset="1" stop-color="#ffe4b7"/>
    </linearGradient>

    <linearGradient id="goldStroke" x1="864" y1="589" x2="1283" y2="589" gradientUnits="userSpaceOnUse">
      <stop stop-color="#edb466" stop-opacity="0"/>
      <stop offset=".26" stop-color="#ffe5b5" stop-opacity=".82"/>
      <stop offset=".5" stop-color="#f5b965" stop-opacity=".44"/>
      <stop offset="1" stop-color="#f4a84a" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="dotMaskGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1097 306) rotate(14) scale(338 266)">
      <stop stop-color="#fff"/>
      <stop offset=".52" stop-color="#fff" stop-opacity=".54"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="rightDustMask" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1472 515) rotate(-8) scale(318 184)">
      <stop stop-color="#fff" stop-opacity=".9"/>
      <stop offset=".64" stop-color="#fff" stop-opacity=".32"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dotPattern" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r=".72" fill="#c7c2b8" opacity=".44"/>
    </pattern>

    <pattern id="microGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#d7d0c4" stroke-opacity=".055" stroke-width=".8"/>
    </pattern>

    <pattern id="fineVerticals" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M1 0V12M7 0V12" stroke="#e8d6b8" stroke-opacity=".11" stroke-width=".55"/>
    </pattern>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".95" numOctaves="3" seed="42" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono">
        <feFuncA type="table" tableValues="0 .18"/>
      </feComponentTransfer>
    </filter>

    <filter id="softBlur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="beamBlur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <filter id="hotGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 0.78 0 0 0.48 0 0 0.35 0 0.08 0 0 0 .9 0" result="warm"/>
      <feMerge>
        <feMergeNode in="warm"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <mask id="dotMask">
      <rect width="1672" height="864" fill="black"/>
      <rect x="760" y="83" width="495" height="470" fill="url(#dotMaskGrad)"/>
    </mask>

    <mask id="rightDustFade">
      <rect width="1672" height="864" fill="black"/>
      <rect x="1260" y="365" width="412" height="248" fill="url(#rightDustMask)"/>
    </mask>

    <clipPath id="sceneClip">
      <rect width="1672" height="864"/>
    </clipPath>
  </defs>

  <g clip-path="url(#sceneClip)">
    <rect width="1672" height="864" fill="url(#backgroundGrad)"/>
    <rect width="1672" height="864" fill="url(#leftVignette)"/>
    <rect x="1138" y="58" width="385" height="330" fill="url(#panelGlow)" opacity=".62"/>
    <rect width="1672" height="864" fill="#020202" opacity=".2"/>
    <rect width="1672" height="864" filter="url(#grain)" opacity=".42"/>

    <g opacity=".38">
      <path d="M0 229H364M0 231H308M835 181H1112M825 590H1038M1437 575H1532M1511 565H1672" stroke="#cfc8b8" stroke-opacity=".16" stroke-width=".8"/>
      <path d="M1009 235H1041V247H1024L1009 235Z" fill="none" stroke="#e7c493" stroke-opacity=".35" stroke-width=".7"/>
      <path d="M1058 116V170M1116 118V258M1582 250V801M1601 283V642" stroke="#d7bd93" stroke-opacity=".13" stroke-width=".9"/>
    </g>

    <g mask="url(#dotMask)" opacity=".92">
      <rect x="760" y="83" width="502" height="480" fill="url(#dotPattern)"/>
      <rect x="957" y="187" width="230" height="204" fill="#111" opacity=".18"/>
    </g>

    <g opacity=".5" mask="url(#rightDustFade)">
      <rect x="1254" y="368" width="418" height="248" fill="url(#dotPattern)" opacity=".42"/>
      <g stroke="#f0b35e" stroke-width=".8" stroke-opacity=".32">
        <path d="M1377 516H1661"/>
        <path d="M1434 545H1653"/>
        <path d="M1504 475H1669"/>
        <path d="M1548 448H1668"/>
        <path d="M1584 401H1667"/>
      </g>
    </g>

    <rect x="1011" y="305" width="303" height="462" fill="url(#microGrid)" opacity=".5"/>
    <rect x="1219" y="343" width="365" height="424" fill="url(#microGrid)" opacity=".35"/>

    <g opacity=".48">
      <rect x="1011.5" y="305.5" width="302" height="461" fill="url(#lowerPanelFill)" opacity=".26"/>
      <path d="M1012 305V766H1314" fill="none" stroke="#e8e3da" stroke-opacity=".32" stroke-width="1"/>
      <path d="M1032 249V578M1189 117V338M1291 344V765M1533 281V768" stroke="#e2ddd2" stroke-opacity=".2" stroke-width="1"/>
      <path d="M963 519H1582M864 589H1282M1218 282H1600" stroke="#cfc8bc" stroke-opacity=".18" stroke-width="1"/>
      <path d="M1415 282V768M1601 282V655M1562 282V780" stroke="#d2b58b" stroke-opacity=".16" stroke-width=".9"/>
      <path d="M1218 344H1600M1011 766H1540M962 520H1011" stroke="#d0c8bb" stroke-opacity=".18" stroke-width=".9"/>
    </g>

    <g opacity=".6">
      <rect x="1218" y="343" width="364" height="425" fill="url(#rightPanelFill)" opacity=".64"/>
      <path d="M1314 343V768M1534 281V768" stroke="#e8e4dc" stroke-opacity=".28" stroke-width="1"/>
      <path d="M1314 520H1585" stroke="url(#hotHorizontal)" stroke-width="1.4"/>
      <path d="M1314 520H1431" stroke="#fff7e7" stroke-opacity=".9" stroke-width=".7"/>
      <path d="M1431 520H1585" stroke="#f0a24e" stroke-opacity=".36" stroke-width="1"/>
      <path d="M1451 520H1672" stroke="#f1a65a" stroke-opacity=".22" stroke-width="4" filter="url(#softBlur)"/>
    </g>

    <g opacity=".9">
      <rect x="1206" y="58" width="394" height="285" fill="url(#topPanelFill)" opacity=".94"/>
      <rect x="1206.5" y="58.5" width="393" height="284" fill="none" stroke="#d2d0ca" stroke-opacity=".24" stroke-width="1"/>
      <path d="M1206 58V342" stroke="url(#softEdge)" stroke-width="1.25"/>
      <path d="M1206 342H1600" stroke="#f6eee0" stroke-opacity=".32" stroke-width="1.1"/>
      <path d="M1206 282H1601" stroke="url(#coolLine)" stroke-width="1.15"/>
      <path d="M1206 282V342" stroke="#fff4db" stroke-opacity=".95" stroke-width="1.2"/>
      <path d="M1206 342H1217" stroke="#ffe2ac" stroke-width="2.5" filter="url(#hotGlow)"/>
      <path d="M1206 282H1228" stroke="#f6f2eb" stroke-opacity=".85" stroke-width=".9"/>
      <rect x="1207" y="59" width="82" height="282" fill="url(#panelGlow)" opacity=".25"/>
    </g>

    <g opacity=".5">
      <rect x="1102" y="382" width="178" height="91" fill="url(#fineVerticals)" opacity=".55"/>
      <path d="M1087 384H1234M1094 399H1284M1097 419H1250M1068 459H1290" stroke="#f1d8ac" stroke-opacity=".23" stroke-width=".8"/>
      <path d="M1220 351V492M1230 350V481M1243 347V476M1255 347V475M1269 346V461" stroke="#f4c078" stroke-opacity=".22" stroke-width=".8"/>
      <path d="M1120 346C1138 342 1160 342 1174 347M1114 364C1143 360 1178 362 1204 371" stroke="#f6bc6a" stroke-opacity=".19" stroke-width=".8" fill="none"/>
    </g>

    <g opacity=".82">
      <path d="M821 804L1211 341" stroke="#575451" stroke-opacity=".38" stroke-width="1.25"/>
      <path d="M950 629L1210 342" stroke="url(#beamBloom)" stroke-width="22" filter="url(#beamBlur)" opacity=".78"/>
      <path d="M847 769L1208 346" stroke="url(#warmBeam)" stroke-width="2.1" filter="url(#hotGlow)"/>
      <path d="M1014 586L1211 341" stroke="#fff8e5" stroke-opacity=".94" stroke-width="1.25"/>
      <path d="M1000 603L1016 586" stroke="#ffd596" stroke-opacity=".72" stroke-width="1.2"/>
    </g>

    <g>
      <path d="M963 519H1584" stroke="url(#hotHorizontal)" stroke-width="1.05"/>
      <path d="M963 519H1021" stroke="#fff8ea" stroke-opacity=".78" stroke-width=".75"/>
      <path d="M864 589H1282" stroke="url(#goldStroke)" stroke-width="1"/>
      <path d="M1207 282H1601" stroke="url(#coolLine)" stroke-width=".85"/>
      <path d="M834 180H1115" stroke="url(#goldStroke)" stroke-width="1"/>
      <path d="M1116 119V309" stroke="#efe8dc" stroke-opacity=".22" stroke-width="1"/>
      <path d="M1012 304V589" stroke="#f1eadf" stroke-opacity=".3" stroke-width=".9"/>
      <path d="M961 519H1013" stroke="#ffffff" stroke-opacity=".7" stroke-width=".7"/>
    </g>

    <g fill="#fff8ec">
