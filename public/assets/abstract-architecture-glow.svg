      <circle cx="1012" cy="589" r="2.1" fill="#ffd49a" opacity=".95" filter="url(#hotGlow)"/>
      <circle cx="1206" cy="282" r="2.3" opacity=".85" filter="url(#hotGlow)"/>
      <circle cx="1236" cy="282" r="1.25" opacity=".75"/>
      <circle cx="1534" cy="282" r="1.85" fill="#ffe3ae" opacity=".92" filter="url(#hotGlow)"/>
      <circle cx="1600" cy="282" r="1.25" fill="#ffe7bd" opacity=".8"/>
      <circle cx="1263" cy="766" r="1.65" fill="#ffcd81" opacity=".88" filter="url(#hotGlow)"/>
      <circle cx="1093" cy="342" r="1.3" fill="#ffdca4" opacity=".7"/>
    </g>

    <g opacity=".45">
      <path d="M1047 233L1024 233L1011 223" stroke="#eee6db" stroke-opacity=".28" stroke-width=".8" fill="none"/>
      <path d="M1047 233V246H1023" stroke="#d9a969" stroke-opacity=".22" stroke-width=".8" fill="none"/>
      <path d="M1054 243H1100M1065 254H1119M1082 266H1162" stroke="#e5b56f" stroke-opacity=".16" stroke-width=".8"/>
      <path d="M979 467V584M991 462V592M1089 522V583M1096 522V585" stroke="#f7d5a5" stroke-opacity=".11" stroke-width=".7"/>
      <path d="M932 579H1012M984 609H1107M948 638H1184" stroke="#dbba86" stroke-opacity=".1" stroke-width=".8"/>
    </g>

    <g opacity=".28">
      <path d="M1276 526C1356 511 1446 504 1547 507C1607 509 1649 516 1672 525" stroke="#f0b068" stroke-opacity=".18" stroke-width=".8" fill="none"/>
      <path d="M1301 548C1374 536 1450 532 1530 538C1585 542 1633 553 1672 570" stroke="#efb368" stroke-opacity=".12" stroke-width=".8" fill="none"/>
      <path d="M1460 469C1510 463 1576 461 1672 469" stroke="#f2bd77" stroke-opacity=".12" stroke-width=".8" fill="none"/>
    </g>

    <rect width="1672" height="864" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="2"/>
    <rect width="1672" height="864" fill="url(#grain)" opacity=".22"/>
  </g>
</svg>
