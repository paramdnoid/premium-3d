<svg xmlns="http://www.w3.org/2000/svg" width="1553" height="1013" viewBox="0 0 1553 1013" role="img" aria-labelledby="title desc">
  <title id="title">Gold architectural interface</title>
  <desc id="desc">A color-faithful dark abstract architectural interface with graphite panels, warm gold construction lines, dense dotted matrices, small HUD labels, and a bright diagonal beam.</desc>
  <defs>
