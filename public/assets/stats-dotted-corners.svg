<svg xmlns="http://www.w3.org/2000/svg" width="1553" height="420" viewBox="0 0 1553 420" role="img" aria-labelledby="title desc">
  <title id="title">Stats dotted corner field</title>
  <desc id="desc">Transparent decorative gold dotted corner fields with small technical rails and micro marks for a dark statistics section.</desc>
  <defs>
    <radialGradient id="leftFade" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(98 192) rotate(7) scale(246 166)">
      <stop stop-color="#fff" stop-opacity=".9"/>
      <stop offset=".55" stop-color="#fff" stop-opacity=".44"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="rightFade" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1444 207) rotate(-8) scale(270 182)">
      <stop stop-color="#fff" stop-opacity=".86"/>
      <stop offset=".58" stop-color="#fff" stop-opacity=".38"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lowGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(790 220) scale(640 198)">
      <stop stop-color="#d9b978" stop-opacity=".1"/>
      <stop offset=".5" stop-color="#d9b978" stop-opacity=".04"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cornerStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff2c8" stop-opacity=".78"/>
      <stop offset=".48" stop-color="#d9a852" stop-opacity=".42"/>
      <stop offset="1" stop-color="#7b5523" stop-opacity=".05"/>
    </linearGradient>

    <linearGradient id="railStroke" x1="0" y1="0" x2="1553" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d7a24b" stop-opacity="0"/>
      <stop offset=".14" stop-color="#e4b45f" stop-opacity=".26"/>
      <stop offset=".5" stop-color="#ffe5a7" stop-opacity=".08"/>
      <stop offset=".86" stop-color="#e4b45f" stop-opacity=".26"/>
      <stop offset="1" stop-color="#d7a24b" stop-opacity="0"/>
    </linearGradient>

    <pattern id="dotPattern" width="13" height="13" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r=".8" fill="#d8a64d" opacity=".6"/>
    </pattern>

    <pattern id="microPattern" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r=".48" fill="#f0bf70" opacity=".38"/>
    </pattern>

    <mask id="leftMask">
      <rect width="1553" height="420" fill="black"/>
      <rect x="-18" y="42" width="306" height="318" fill="url(#leftFade)"/>
    </mask>

    <mask id="rightMask">
      <rect width="1553" height="420" fill="black"/>
      <rect x="1263" y="40" width="310" height="326" fill="url(#rightFade)"/>
    </mask>

    <filter id="smallGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <rect width="1553" height="420" fill="none"/>
  <rect width="1553" height="420" fill="url(#lowGlow)"/>

  <g mask="url(#leftMask)" opacity=".86">
    <rect x="-24" y="44" width="312" height="312" fill="url(#dotPattern)"/>
    <rect x="28" y="96" width="192" height="192" fill="url(#microPattern)" opacity=".7"/>
    <path d="M14 71V258M14 71H18M14 258H52M0 112H185M0 168H240M0 241H156" stroke="#d7a24b" stroke-opacity=".22" stroke-width=".85"/>
    <path d="M38 92V278M38 278H104M68 127H214M82 214H246" stroke="#f0c77e" stroke-opacity=".12" stroke-width=".75"/>
    <path d="M15 86L30 71M52 258L72 238" stroke="#f6cf86" stroke-opacity=".38" stroke-width=".85"/>
    <circle cx="14" cy="71" r="2.1" fill="#f2bd68"/>
    <circle cx="38" cy="258" r="1.45" fill="#f6d798"/>
    <circle cx="106" cy="214" r="1.15" fill="#f6c36f"/>
    <circle cx="180" cy="168" r="1.1" fill="#e3aa52"/>
    <circle cx="31" cy="310" r="1.2" fill="#f3c16e"/>
  </g>

  <g mask="url(#rightMask)" opacity=".9">
    <rect x="1260" y="42" width="314" height="320" fill="url(#dotPattern)"/>
    <rect x="1328" y="92" width="202" height="216" fill="url(#microPattern)" opacity=".76"/>
    <path d="M1538 59V323M1538 59H1553M1538 323H1510M1549 132H1376M1553 208H1304M1553 283H1390" stroke="#d7a24b" stroke-opacity=".24" stroke-width=".85"/>
    <path d="M1513 82V300M1513 300H1431M1482 119H1320M1460 238H1284" stroke="#f0c77e" stroke-opacity=".12" stroke-width=".75"/>
    <path d="M1538 59L1522 75M1510 323L1492 304" stroke="#f6cf86" stroke-opacity=".42" stroke-width=".85"/>
    <circle cx="1538" cy="59" r="2" fill="#f2bd68"/>
    <circle cx="1513" cy="300" r="1.55" fill="#f6d798"/>
    <circle cx="1442" cy="238" r="1.15" fill="#f6c36f"/>
    <circle cx="1378" cy="132" r="1.1" fill="#e3aa52"/>
    <circle cx="1521" cy="367" r="1.25" fill="#f3c16e"/>
  </g>

  <g fill="#e0ad5c" opacity=".58">
    <circle cx="85" cy="186" r="1.15"/>
    <circle cx="142" cy="118" r=".82"/>
    <circle cx="220" cy="252" r=".74"/>
    <circle cx="1323" cy="177" r=".78"/>
    <circle cx="1398" cy="91" r=".72"/>
    <circle cx="1486" cy="260" r=".9"/>
  </g>

  <path d="M36 16H88M1468 404H1522M0 210H172M1384 210H1553" stroke="url(#railStroke)" stroke-width=".8"/>
  <circle cx="36" cy="16" r="1.7" fill="#f4d28d" opacity=".72" filter="url(#smallGlow)"/>
  <circle cx="1519" cy="404" r="1.7" fill="#f4d28d" opacity=".72" filter="url(#smallGlow)"/>
</svg>
